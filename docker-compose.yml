services:
  automator:
    container_name: automator
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/automator/Dockerfile
    ports:
      - "3200:3200"
    env_file:
      - apps/automator/.env
    environment:
      HEADLESS: "true"
      PROFILES_DIR: /data/profiles
      IMAGES_DIR: /data/images
      DATABASE_URL: file:/data/db/dev.db
      PROFILE_NAME: stereopt-linux
    volumes:
      - ./profiles:/data/profiles
      - ./apps/dashboard/public/images:/data/images
      - ./packages/database/prisma:/data/db
    restart: unless-stopped
    networks:
      - insta-puppeteer

  dashboard:
    container_name: dashboard
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/dashboard/.env
    environment:
      DATABASE_URL: file:/data/db/dev.db
      AUTOMATOR_URL: http://automator:3200
      IMAGES_DIR: /data/images
    volumes:
      - ./apps/dashboard/public/images:/data/images
      - ./packages/database/prisma:/data/db
    depends_on:
      - automator
    restart: unless-stopped
    networks:
      - insta-puppeteer

networks:
  insta-puppeteer:
    driver: bridge
